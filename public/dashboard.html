<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-bg">
    <nav class="navbar glass-nav">
        <div class="nav-brand">Attendance<span>Pro</span></div>
        <div class="nav-user">
            <span id="userNameDisplay">Welcome</span>
            <button id="logoutBtn" class="btn outline-btn btn-sm">Log Out</button>
        </div>
    </nav>

    <!-- Student Dashboard -->
    <main class="dashboard-container" id="studentDashboard" style="display: none;">
        <div class="glass-card profile-card">
            <div class="avatar-circle"></div>
            <h2 id="studentName">Loading...</h2>
            <p class="student-role">Student</p>

            <div class="attendance-actions">
                <h3>Mark Today's Attendance</h3>
                <div class="action-buttons">
                    <button id="markPresentBtn" class="btn success-btn">Present</button>
                    <button id="markAbsentBtn" class="btn danger-btn">Absent</button>
                </div>
                <div id="studentActionMsg" class="action-message"></div>
            </div>
        </div>

        <div class="glass-card records-card">
            <h3>My Attendance History</h3>
            <div class="table-container">
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceRecords">
                        <tr>
                            <td colspan="2" class="loading-cell">Loading records...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Teacher Dashboard -->
    <main class="dashboard-container" id="teacherDashboard" style="display: none; grid-template-columns: 1fr;">
        <div class="glass-card records-card" style="margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Register New Student</h3>
                <div id="addStudentMsg" class="action-message"></div>
            </div>
            <form id="addStudentForm" style="display:flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="newStudentName" placeholder="Student Name" required
                    style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; flex:1; min-width: 150px;">
                <input type="email" id="newStudentEmail" placeholder="Email Address" required
                    style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; flex:1; min-width: 150px;">
                <input type="password" id="newStudentPassword" placeholder="Default Password" required
                    style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; flex:1; min-width: 150px;">
                <button type="submit" class="btn primary-btn btn-sm" style="width: auto; padding: 10px 20px;">Add
                    Student</button>
            </form>
        </div>

        <div class="glass-card records-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Today's Class Roster</h3>
                <div id="actionMsg" class="action-message"></div>
                <h4 style="color: var(--text-muted);" id="dateDisplay"></h4>
            </div>

            <div class="table-container">
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Current Status</th>
                            <th>Mark Attendance</th>
                        </tr>
                    </thead>
                    <tbody id="rosterRecords">
                        <tr>
                            <td colspan="3" class="loading-cell">Loading roster...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Check authentication immediately on dashboard load
        if (!localStorage.getItem('token')) {
            window.location.href = '/index.html';
        }
    </script>
</body>

</html>
